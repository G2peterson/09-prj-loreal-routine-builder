<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal Routine Builder</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">
      <header>
        <h1>L’Oréal</h1>
        <h2>Routine Builder</h2>
      </header>

      <section class="controls">
        <select id="categoryFilter">
          <option value="">Select a category</option>
        </select>
      </section>

      <section id="productsContainer" class="products-grid"></section>

      <section class="selected">
        <h3>Selected Products</h3>
        <div id="selectedProductsList"></div>
        <button id="generateRoutine">Generate Routine</button>
      </section>

      <section class="chat">
        <h3>About Your Routine</h3>
        <div id="chatWindow"></div>

        <form id="chatForm">
          <input
            id="userInput"
            placeholder="Ask about your routine..."
            required
          />
          <button type="submit">➤</button>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
